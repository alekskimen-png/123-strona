<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Menedżer Zadań</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">✓</span>
                <h1>TaskFlow</h1>
            </div>
            <p class="subtitle">Prosty menedżer zadań z backendem Flask</p>
        </header>

        <main class="app-main">
            <section class="add-task-section">
                <form id="task-form" class="task-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="task-input" 
                            placeholder="Dodaj nowe zadanie..." 
                            required 
                            autocomplete="off"
                            aria-label="Treść zadania"
                        >
                        <button type="submit" class="btn btn-primary" aria-label="Dodaj zadanie">
                            <span class="btn-icon">+</span>
                            Dodaj
                        </button>
                    </div>
                </form>
            </section>

            <section class="tasks-section">
                <div class="tasks-header">
                    <h2>Lista zadań</h2>
                    <span class="tasks-count" id="tasks-count">0</span>
                </div>
                
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">Wszystkie</button>
                    <button class="filter-btn" data-filter="active">Aktywne</button>
                    <button class="filter-btn" data-filter="completed">Zakończone</button>
                </div>

                <div id="tasks-list" class="tasks-list" role="list" aria-label="Lista zadań">
                    <!-- Zadania będą renderowane przez JS -->
                </div>

                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p class="empty-title">Brak zadań</p>
                    <p class="empty-desc">Dodaj swoje pierwsze zadanie powyżej!</p>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>TaskFlow &copy; 2024 &mdash; Zbudowane z Flask &amp; Vanilla JS</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
