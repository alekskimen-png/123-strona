<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gnojnik - Król Grzybów Pól i Łąk 🍄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ===== GNOJNIK - DODATKOWE STYLE ===== */
        :root {
            --gnojnik-green: #4ade80;
            --gnojnik-brown: #a16207;
            --gnojnik-dark: #7c2d12;
            --gradient-gnojnik: linear-gradient(135deg, #4ade80, #a16207, #7c2d12);
            --gradient-forest: linear-gradient(135deg, #166534, #4ade80, #a16207);
        }

        /* Hero */
        .gnojnik-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 8rem 2rem 6rem;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f172a 30%, #1a2235 60%, #0f172a 100%);
        }

        .gnojnik-hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(74, 222, 128, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(161, 98, 7, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(124, 45, 18, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .gnojnik-hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .gnojnik-hero-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gnojnik-green);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .gnojnik-hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #4ade80 0%, #a16207 40%, #7c2d12 70%, #f1f5f9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gnojnik-hero-subinfo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .subinfo-dot {
            color: var(--gnojnik-green);
            font-weight: 700;
        }

        .gnojnik-hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 2rem;
            line-height: 1.7;
            font-style: italic;
        }

        .gnojnik-hero-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        /* Floating elements */
        .gnojnik-float-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .gnojnik-float {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.12;
            animation: heroFloat 18s infinite ease-in-out;
        }

        .gnojnik-float:nth-child(1) { top: 8%; left: 8%; animation-delay: 0s; font-size: 2.5rem; }
        .gnojnik-float:nth-child(2) { top: 15%; right: 12%; animation-delay: 2.5s; font-size: 3.2rem; }
        .gnojnik-float:nth-child(3) { bottom: 12%; left: 15%; animation-delay: 5s; font-size: 2rem; }
        .gnojnik-float:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 1.5s; font-size: 2.8rem; }
        .gnojnik-float:nth-child(5) { top: 45%; left: 4%; animation-delay: 3.5s; font-size: 3.5rem; }
        .gnojnik-float:nth-child(6) { top: 55%; right: 4%; animation-delay: 4.5s; font-size: 2.2rem; }
        .gnojnik-float:nth-child(7) { top: 25%; left: 50%; animation-delay: 6s; font-size: 2rem; }
        .gnojnik-float:nth-child(8) { top: 70%; left: 30%; animation-delay: 7s; font-size: 1.8rem; }

        /* Bio grid (dla sekcji o gnojniku) */
        .gnojnik-bio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .gnojnik-bio-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 2rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .gnojnik-bio-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gnojnik);
            opacity: 0;
            transition: var(--transition);
        }

        .gnojnik-bio-card:hover {
            transform: translateY(-5px);
            border-color: rgba(74, 222, 128, 0.2);
            box-shadow: var(--shadow-lg);
            background: var(--bg-card-hover);
        }
